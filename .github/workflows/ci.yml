name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Run ruff linter
        run: ruff check ctd_processor/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (HDF5 / NetCDF4)
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libhdf5-dev libnetcdf-dev

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate sample CTD data
        timeout-minutes: 3
        run: python sample_data/generate_sample_cnv.py

      - name: Run test suite
        timeout-minutes: 10
        run: pytest -v --tb=short tests/

      - name: Run tests with coverage report
        timeout-minutes: 10
        if: matrix.python-version == '3.11'
        run: |
          pytest --cov=ctd_processor --cov-report=term-missing --cov-report=xml tests/

  build:
    name: Package build check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build --sdist --wheel .

      - name: Verify wheel exists
        run: ls -lh dist/
